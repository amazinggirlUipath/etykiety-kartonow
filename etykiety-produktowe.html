<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Etykiety produktowe [v4]</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    margin: 0;
    color: #333;
    background: #fafafa;
  }

  #status-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #fafafa;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 20px;
  }

  .status-box {
    text-align: center;
    max-width: 600px;
    background: white;
    padding: 32px;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #e0e0e0; border-top-color: #2c5282;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #status { font-size: 14px; line-height: 1.5; color: #444; }
  .err { color: #c33; }

  .summary {
    background: #f0f7ff;
    border: 1px solid #cce0f5;
    border-radius: 6px;
    padding: 16px;
    margin: 16px 0;
    font-size: 13px;
    line-height: 1.6;
    text-align: left;
  }
  .summary strong { color: #2c5282; }

  .btns { margin-top: 20px; }
  button {
    margin: 4px;
    padding: 12px 24px;
    background: #2c5282;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }
  button:hover:not(:disabled) { background: #1e4072; }
  button.secondary { background: #888; }
  button.secondary:hover:not(:disabled) { background: #666; }

  .choice {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 16px 0;
  }
  .choice button {
    flex: 1;
    min-width: 200px;
    padding: 18px 24px;
    font-size: 15px;
  }
  .choice button.pdf-btn { background: #2f855a; }
  .choice button.pdf-btn:hover { background: #276749; }

  .progress-bar {
    background: #e0e0e0;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress-bar-fill {
    background: #2c5282;
    height: 100%;
    width: 0%;
    transition: width 0.3s;
  }

  pre {
    background: #f0f0f0; padding: 8px; border-radius: 4px;
    font-size: 11px; text-align: left; overflow: auto;
    max-height: 300px; margin-top: 12px;
  }

  #labels {
    padding: 20px 0;
    display: none;
  }

  .label-frame {
    width: 210mm;
    height: 297mm;
    margin: 0 auto 8mm;
    border: 1px solid #ddd;
    display: block;
    background: white;
    page-break-after: always;
  }

  @page { size: A4 portrait; margin: 0; }

  @media print {
    body { background: white; margin: 0; padding: 0; }
    #status-overlay { display: none !important; }
    #labels { padding: 0; display: block !important; }
    .label-frame {
      width: 100%;
      height: 100vh;
      margin: 0;
      border: none;
      page-break-after: always;
      page-break-inside: avoid;
    }
    .label-frame:last-child { page-break-after: auto; }
  }
</style>
</head>
<body>

<div id="status-overlay">
  <div class="status-box">
    <div class="spinner" id="spinner"></div>
    <div id="status">Inicjalizacja...</div>
    <div id="progress-bar" class="progress-bar" style="display:none">
      <div id="progress-bar-fill" class="progress-bar-fill"></div>
    </div>
    <div id="summary-box" class="summary" style="display:none"></div>
    <div class="btns">
      <div id="choice-buttons" class="choice" style="display:none">
        <button onclick="handleChoice('print')">🖨 Drukuj</button>
        <button class="pdf-btn" onclick="handleChoice('pdf')">📄 Pobierz jako PDF</button>
      </div>
      <button id="backBtn" class="secondary" style="display:none" onclick="returnToRagic()">Wróć do Ragic</button>
    </div>
    <pre id="debug" style="display:none"></pre>
  </div>
</div>

<div id="labels"></div>

<script>
// ============ KONFIGURACJA ============
var CONFIG = {
  BASE_URL: 'https://eu3.ragic.com/AMAZINGGIRL/szwalnia-mg/80',
  API_KEY: 'QUtiQ0QyMGt2cDB0SVI1TlRBOHQrWmJPMTNCY3hJaG5RUnBQU09FdEJRSXVVeU5MdHRvT2Y3ejV1KyttWTZFWGUraTB2NGJ1bm5wVkFOcDV5WURWY0E9PQ==',

  // !!! UZUPEŁNIJ TUTAJ URL TWOJEGO CLOUDFLARE WORKERA !!!
  // Format: https://NAZWA.TWOJE-KONTO.workers.dev (bez trailing slash, bez /?url=)
  PROXY_URL: 'https://ragic-proxy.sprzedaz-40c.workers.dev',

  URL_FIELD_NAMES: ['ETYKIETA PRODUKTOWA', 'ETYKIETA_PRODUKTOWA'],
  QTY_FIELD_NAMES: [
    'ILOŚCI DO PRODUKCJI', 'ILOSCI DO PRODUKCJI',
    'ILOŚCI_DO_PRODUKCJI', 'ILOSCI_DO_PRODUKCJI'
  ],

  MAX_LABELS_WARN: 300,
  POST_LOAD_DELAY_MS: 500,

  PDF_RENDER_SCALE: 2,
  PDF_JPEG_QUALITY: 0.85,
  RAGIC_ORIGIN: 'https://eu3.ragic.com'
};
// =======================================

var state = {
  recordId: null,
  items: [],
  totalLabels: 0,
  uniqueUrls: 0
};

function setStatus(html, isErr) {
  var el = document.getElementById('status');
  el.innerHTML = html;
  el.className = isErr ? 'err' : '';
  if (isErr) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('progress-bar').style.display = 'none';
    document.getElementById('backBtn').style.display = 'inline-block';
  }
}

function setProgress(percent) {
  var bar = document.getElementById('progress-bar');
  var fill = document.getElementById('progress-bar-fill');
  bar.style.display = 'block';
  fill.style.width = Math.max(0, Math.min(100, percent)) + '%';
}

function hideProgress() {
  document.getElementById('progress-bar').style.display = 'none';
}

function showDebug(obj) {
  var el = document.getElementById('debug');
  el.style.display = 'block';
  el.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
}

function returnToRagic() {
  try { window.close(); } catch(e) {}
  setTimeout(function() {
    if (window.history.length > 1) window.history.back();
  }, 80);
}

// Buduje URL przez proxy (zamienia https://eu3.ragic.com/x -> https://worker/?url=https%3A...)
function viaProxy(url) {
  if (!CONFIG.PROXY_URL || CONFIG.PROXY_URL.indexOf('TWOJE-KONTO') !== -1) {
    throw new Error('PROXY_URL nie został skonfigurowany w CONFIG. Wpisz URL swojego Cloudflare Workera.');
  }
  return CONFIG.PROXY_URL.replace(/\/$/, '') + '/?url=' + encodeURIComponent(url);
}

function jsonp(url) {
  return new Promise(function(resolve, reject) {
    var callbackName = 'ragicCb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    var script = document.createElement('script');
    var timeout = setTimeout(function() {
      reject(new Error('Timeout - Ragic API nie odpowiada w ciągu 15s'));
      cleanup();
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(data) {
      resolve(data);
      cleanup();
    };

    var sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + callbackName;
    script.onerror = function() {
      reject(new Error('Nie udało się połączyć z Ragic API.'));
      cleanup();
    };
    document.head.appendChild(script);
  });
}

function getField(obj, names) {
  for (var i = 0; i < names.length; i++) {
    var v = obj[names[i]];
    if (v !== undefined && v !== null && v !== '') return v;
  }
  return '';
}

function sleep(ms) {
  return new Promise(function(r) { setTimeout(r, ms); });
}

// ============ FAZA 1: pobranie danych i pokazanie wyboru ============

function loadDataAndShowChoice() {
  var params = new URLSearchParams(window.location.search);
  var recordId = params.get('recordId');
  var debugMode = params.get('debug') === '1';

  if (!recordId) {
    setStatus('Brak parametru recordId w URL.', true);
    return;
  }
  state.recordId = recordId;

  setStatus('Pobieram dane z Ragic...');

  var apiUrl = CONFIG.BASE_URL + '/' + recordId +
               '?api&v=3&APIKey=' + encodeURIComponent(CONFIG.API_KEY) +
               '&naming=fname';

  jsonp(apiUrl).then(function(data) {
    var topKeys = Object.keys(data);
    if (topKeys.length === 1 && /^\d+$/.test(topKeys[0]) && typeof data[topKeys[0]] === 'object') {
      data = data[topKeys[0]];
    }

    if (debugMode) {
      setStatus('Tryb debug - struktura danych z API:');
      showDebug(data);
      return;
    }

    var items = [];
    for (var key in data) {
      if (key.indexOf('_subtable') === 0 && typeof data[key] === 'object') {
        for (var rowKey in data[key]) {
          var row = data[key][rowKey];
          if (!row || typeof row !== 'object') continue;

          var url = getField(row, CONFIG.URL_FIELD_NAMES);
          var qtyRaw = getField(row, CONFIG.QTY_FIELD_NAMES);
          var qty = parseInt(qtyRaw, 10);

          if (url && !isNaN(qty) && qty > 0) {
            items.push({ url: String(url).trim(), qty: qty });
          }
        }
      }
    }

    if (items.length === 0) {
      setStatus(
        'Brak etykiet do druku.<br><br>' +
        'Sprawdź czy w którymkolwiek wierszu obu subtabel jednocześnie wypełnione są:<br>' +
        '• ETYKIETA PRODUKTOWA (URL)<br>' +
        '• ILOŚCI DO PRODUKCJI (liczba > 0)<br><br>' +
        'Aby zobaczyć strukturę danych z API, dodaj <code>&debug=1</code> do URL tej strony.',
        true
      );
      return;
    }

    state.items = items;
    state.totalLabels = items.reduce(function(s, i){ return s + i.qty; }, 0);
    var uniqueMap = {};
    items.forEach(function(i){ uniqueMap[i.url] = true; });
    state.uniqueUrls = Object.keys(uniqueMap).length;

    showChoiceUI();

  }).catch(function(err) {
    setStatus('Błąd: ' + err.message, true);
    console.error(err);
  });
}

function showChoiceUI() {
  document.getElementById('spinner').style.display = 'none';

  var warn = '';
  if (state.totalLabels > CONFIG.MAX_LABELS_WARN) {
    warn = '<br><strong style="color:#c33">⚠️ Duża liczba etykiet</strong> – przetwarzanie może chwilę potrwać.';
  }

  document.getElementById('status').innerHTML = '<strong style="font-size:16px">Co chcesz zrobić z etykietami?</strong>';

  var summary = document.getElementById('summary-box');
  summary.innerHTML =
    'Rekord: <strong>#' + state.recordId + '</strong><br>' +
    'Liczba etykiet do wygenerowania: <strong>' + state.totalLabels + '</strong><br>' +
    'Unikalnych szablonów: <strong>' + state.uniqueUrls + '</strong>' +
    warn;
  summary.style.display = 'block';

  document.getElementById('choice-buttons').style.display = 'flex';
  document.getElementById('backBtn').style.display = 'inline-block';
}

// ============ FAZA 2: ładowanie etykiet i akcja ============

function handleChoice(mode) {
  document.getElementById('choice-buttons').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('summary-box').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';

  if (mode === 'print') {
    runPrintMode();
  } else if (mode === 'pdf') {
    runPdfMode();
  }
}

// ============ TRYB DRUKUJ (iframe + window.print) ============

function runPrintMode() {
  var container = document.getElementById('labels');
  container.innerHTML = '';
  container.style.display = 'block';

  var totalLabels = state.totalLabels;
  var loadedCount = 0;
  var failedCount = 0;
  var updateInterval = null;

  function updateProgress() {
    var done = loadedCount + failedCount;
    var msg = 'Ładuję etykiety... <strong>' + done + ' / ' + totalLabels + '</strong>';
    if (failedCount > 0) msg += ' <span class="err">(' + failedCount + ' błędów)</span>';
    document.getElementById('status').innerHTML = msg;
    setProgress((done / totalLabels) * 100);
  }

  function onAllLoaded() {
    clearInterval(updateInterval);
    hideProgress();

    if (failedCount === totalLabels) {
      setStatus('Nie udało się załadować żadnej etykiety.', true);
      return;
    }

    var failMsg = failedCount > 0
      ? ' (<span class="err">' + failedCount + ' nie wczytało się</span>)'
      : '';

    document.getElementById('spinner').style.display = 'none';
    setStatus(
      'Załadowano <strong>' + loadedCount + ' / ' + totalLabels + '</strong> etykiet' + failMsg + '.<br>' +
      'Otwieram dialog druku...'
    );
    document.getElementById('backBtn').style.display = 'inline-block';
    setTimeout(function() { window.print(); }, CONFIG.POST_LOAD_DELAY_MS);
  }

  function checkDone() {
    if (loadedCount + failedCount === totalLabels) {
      setTimeout(onAllLoaded, 400);
    }
  }

  updateInterval = setInterval(updateProgress, 200);

  // Tryb DRUKUJ używa bezpośrednich URL-i (nie przez proxy) - iframe src nie podlega CORS
  state.items.forEach(function(item) {
    for (var i = 0; i < item.qty; i++) {
      var iframe = document.createElement('iframe');
      iframe.className = 'label-frame';
      iframe.src = item.url;
      iframe.loading = 'eager';
      iframe.onload = function() { loadedCount++; checkDone(); };
      iframe.onerror = function() { failedCount++; checkDone(); };
      container.appendChild(iframe);
    }
  });
}

// ============ TRYB POBIERZ PDF (przez proxy + html2canvas + jsPDF) ============

async function runPdfMode() {
  try {
    // Weryfikacja proxy
    if (!CONFIG.PROXY_URL || CONFIG.PROXY_URL.indexOf('TWOJE-KONTO') !== -1) {
      throw new Error('PROXY_URL nie skonfigurowany. Wpisz URL Cloudflare Workera w sekcji CONFIG na początku pliku.');
    }

    // Lista unikalnych URL-i
    var uniqueUrls = [];
    var seen = {};
    state.items.forEach(function(item) {
      if (!seen[item.url]) {
        seen[item.url] = true;
        uniqueUrls.push(item.url);
      }
    });

    // Renderuj każdy unikalny URL do canvasa
    var canvases = {};
    for (var i = 0; i < uniqueUrls.length; i++) {
      var url = uniqueUrls[i];
      setStatus('Renderuję szablon <strong>' + (i + 1) + ' / ' + uniqueUrls.length + '</strong>...');
      setProgress((i / uniqueUrls.length) * 80);

      try {
        canvases[url] = await renderUrlToCanvas(url);
      } catch (err) {
        console.error('Błąd renderowania ' + url + ':', err);
        canvases[url] = null;
      }
    }

    var successCount = Object.keys(canvases).filter(function(u) { return canvases[u]; }).length;
    if (successCount === 0) {
      throw new Error('Nie udało się wyrenderować żadnego szablonu. Sprawdź konsolę (F12) dla szczegółów.');
    }

    // Buduj PDF
    setStatus('Buduję plik PDF...');
    setProgress(85);
    await sleep(50);

    var jsPDF = window.jspdf.jsPDF;
    var pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    var firstPage = true;
    var pageNum = 0;
    var aliasMap = {};
    var aliasCounter = 0;

    for (var k = 0; k < state.items.length; k++) {
      var it = state.items[k];
      var canvas = canvases[it.url];
      if (!canvas) continue;

      if (!aliasMap[it.url]) aliasMap[it.url] = 'img_' + (aliasCounter++);
      var alias = aliasMap[it.url];
      var imgData = canvas.toDataURL('image/jpeg', CONFIG.PDF_JPEG_QUALITY);

      for (var n = 0; n < it.qty; n++) {
        if (!firstPage) pdf.addPage();
        pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297, alias, 'FAST');
        firstPage = false;
        pageNum++;

        if (pageNum % 10 === 0) {
          setStatus('Buduję plik PDF... <strong>' + pageNum + ' / ' + state.totalLabels + '</strong> stron');
          setProgress(85 + (pageNum / state.totalLabels) * 13);
          await sleep(10);
        }
      }
    }

    setStatus('Pobieram plik...');
    setProgress(100);
    await sleep(100);

    var fileName = 'etykiety_' + state.recordId + '_' + new Date().toISOString().slice(0, 10) + '.pdf';
    pdf.save(fileName);

    document.getElementById('spinner').style.display = 'none';
    hideProgress();
    setStatus(
      '<strong>✅ Gotowe!</strong><br>' +
      'PDF został pobrany (' + pageNum + ' stron).<br>' +
      '<small style="color:#888">Sprawdź folder Pobrane.</small>'
    );
    document.getElementById('backBtn').style.display = 'inline-block';

  } catch (err) {
    console.error(err);
    setStatus(
      'Błąd generowania PDF: ' + err.message + '<br><br>' +
      '<small>Spróbuj użyć opcji <strong>Drukuj</strong> i wybrać „Zapisz jako PDF" w oknie druku.</small>',
      true
    );
  }
}

// Renderuje pojedynczy URL Ragic etykiety do canvasa
async function renderUrlToCanvas(url) {
  // 1. Pobierz HTML przez Cloudflare Worker (omija CORS)
  var proxiedUrl = viaProxy(url);
  console.log('[renderUrl] Fetch via proxy:', proxiedUrl);

  var html = await fetch(proxiedUrl).then(function(r) {
    if (!r.ok) throw new Error('Proxy HTTP ' + r.status + ' dla ' + url);
    return r.text();
  });

  // 2. Zamień RELATYWNE URL-e w HTML na ABSOLUTNE, kierując je przez proxy
  //    (dzięki temu CSS, fonty, obrazy też przejdą przez proxy)
  var proxyPrefix = CONFIG.PROXY_URL.replace(/\/$/, '') + '/?url=';

  // href="/x" lub src="/x" -> przez proxy
  html = html.replace(/(href|src)\s*=\s*(["'])(\/[^"']*?)\2/gi, function(match, attr, q, path) {
    var absolute = CONFIG.RAGIC_ORIGIN + path;
    return attr + '=' + q + proxyPrefix + encodeURIComponent(absolute) + q;
  });

  // url("/x") w inline style -> przez proxy
  html = html.replace(/url\(\s*(["']?)(\/[^"')]*?)\1\s*\)/gi, function(match, q, path) {
    var absolute = CONFIG.RAGIC_ORIGIN + path;
    return 'url(' + q + proxyPrefix + encodeURIComponent(absolute) + q + ')';
  });

  // 3. Wytnij <script> (nie chcemy żeby JS Ragica się wykonywał)
  html = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
  html = html.replace(/<script\b[^>]*\/>/gi, '');

  // 4. Stwórz ukryty iframe (srcdoc = same-origin = dostęp do DOM przez html2canvas)
  var iframe = document.createElement('iframe');
  iframe.style.position = 'absolute';
  iframe.style.left = '-99999px';
  iframe.style.top = '0';
  iframe.style.width = '210mm';
  iframe.style.height = '297mm';
  iframe.style.border = 'none';
  iframe.style.background = 'white';
  iframe.srcdoc = html;
  document.body.appendChild(iframe);

  try {
    // 5. Czekaj na załadowanie iframe
    await new Promise(function(resolve, reject) {
      var resolved = false;
      iframe.onload = function() { if (!resolved) { resolved = true; resolve(); } };
      iframe.onerror = function() { reject(new Error('iframe error')); };
      setTimeout(function() { if (!resolved) { resolved = true; resolve(); } }, 15000);
    });

    var doc = iframe.contentDocument;
    if (!doc) throw new Error('Brak dostępu do contentDocument iframe');

    // 6. Czekaj na fonty
    if (doc.fonts && doc.fonts.ready) {
      try { await doc.fonts.ready; } catch (e) {}
    }

    // 7. Czekaj na obrazy
    var images = Array.prototype.slice.call(doc.querySelectorAll('img'));
    await Promise.all(images.map(function(img) {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise(function(resolve) {
        var done = false;
        var finish = function() { if (!done) { done = true; resolve(); } };
        img.onload = finish;
        img.onerror = finish;
        setTimeout(finish, 8000);
      });
    }));

    // Bufor czasu na renderowanie
    await sleep(1000);

    // 8. Renderuj do canvasa
    var target = doc.body;
    var canvas = await html2canvas(target, {
      scale: CONFIG.PDF_RENDER_SCALE,
      useCORS: true,
      allowTaint: true,
      logging: false,
      backgroundColor: '#ffffff',
      width: target.scrollWidth || target.offsetWidth || 794,
      height: target.scrollHeight || target.offsetHeight || 1123,
      windowWidth: 794,
      windowHeight: 1123
    });

    return canvas;
  } finally {
    if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
  }
}

// ============ START ============

if (document.readyState === 'complete') {
  loadDataAndShowChoice();
} else {
  window.addEventListener('load', loadDataAndShowChoice);
}
</script>

</body>
</html>
