<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Pobieranie etykiet... [v5]</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; background: #fafafa; color: #555;
  }
  .box { text-align: center; padding: 24px; max-width: 480px; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e0e0e0; border-top-color: #2c5282;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status { font-size: 14px; }
  .err { color: #c33; }
  .err + #spinner { display: none; }
  .back-link {
    display: inline-block; margin-top: 16px;
    color: #2c5282; text-decoration: none; font-size: 13px;
  }
  pre {
    background: #f0f0f0; padding: 8px; border-radius: 4px;
    font-size: 11px; text-align: left; overflow: auto;
    max-height: 300px; margin-top: 12px;
  }
</style>
</head>
<body>

<div class="box">
  <div class="spinner" id="spinner"></div>
  <div id="status">Inicjalizacja... [v5 - SKU pierwszy, nazwa drobna]</div>
  <a href="#" class="back-link" id="backLink" style="display:none" onclick="returnToRagic(); return false;">Wroc do Ragic</a>
  <pre id="debug" style="display:none"></pre>
</div>

<script>
// ============ KONFIGURACJA ============
var CONFIG = {
  BASE_URL: 'https://eu3.ragic.com/AMAZINGGIRL/wys/1',
  API_KEY: 'QUtiQ0QyMGt2cDB0SVI1TlRBOHQrWmJPMTNCY3hJaG5RUnBQU09FdEJRSXVVeU5MdHRvT2Y3ejV1KyttWTZFWGUraTB2NGJ1bm5wVkFOcDV5WURWY0E9PQ==',

  // Dokladna nazwa pola z numerem kartonu w subtabeli
  // Jesli to nie zadziala, debug pokaze strukture danych - poprawisz tutaj
  SUBTABLE_BARCODE_FIELD_NAME: 'NUMER KARTONU',

  // Pole formuly z agregowana lista kodow oddzielonych przecinkiem
  // (UNIQUE z subtabeli) - glowne zrodlo kodow
  CODES_CSV_FIELD_NAME: 'KODY_KARTONOW_CSV',

  // Nazwa pola z numerem zamowienia (do tytulu PDF)
  ORDER_FIELD_NAME: 'NUMER ZAMOWIENIA',

  // Dodatkowe pola produktu wyswietlane na kazdej etykiecie
  PRODUCT_NAME_FIELD_NAME: 'NAZWA PRODUKTU',
  SKU_FIELD_NAME: 'SKU',
  PIECES_PER_BOX_FIELD_NAME: 'SZT W KARTON',

  BARCODE_FORMAT: 'CODE128'
};
// =======================================

function setStatus(msg, isErr) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
  if (isErr) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('backLink').style.display = 'inline-block';
  }
}

function showDebug(obj) {
  var el = document.getElementById('debug');
  el.style.display = 'block';
  el.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
}

function returnToRagic() {
  try { window.close(); } catch(e) {}
  setTimeout(function() {
    if (window.history.length > 1) window.history.back();
  }, 80);
}

function jsonp(url) {
  return new Promise(function(resolve, reject) {
    var callbackName = 'ragicCb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    var script = document.createElement('script');
    var timeout = setTimeout(function() {
      reject(new Error('Timeout - Ragic API nie odpowiada w ciagu 15s'));
      cleanup();
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(data) {
      resolve(data);
      cleanup();
    };

    var sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + callbackName;
    script.onerror = function() {
      reject(new Error('Nie udalo sie polaczyc z Ragic API. Sprawdz BASE_URL i API_KEY.'));
      cleanup();
    };
    document.head.appendChild(script);
  });
}

function generate() {
  var params = new URLSearchParams(window.location.search);
  var recordId = params.get('recordId');
  var debugMode = params.get('debug') === '1';

  if (!recordId) {
    setStatus('Brak parametru recordId w URL', true);
    return;
  }

  setStatus('Pobieram dane z Ragic...');

  var apiUrl = CONFIG.BASE_URL + '/' + recordId + '?api&v=3&APIKey=' + encodeURIComponent(CONFIG.API_KEY) + '&naming=fname';

  // Helper - probuje pobrac pole pod kilkoma wariantami nazw
  function getField(data, names) {
    for (var i = 0; i < names.length; i++) {
      var v = data[names[i]];
      if (v !== undefined && v !== null && v !== '') return v;
    }
    return '';
  }

  jsonp(apiUrl).then(function(data) {
    try {
      // Ragic API zwraca odpowiedz opakowana: {"35025": {...rekord...}}
      var topKeys = Object.keys(data);
      if (topKeys.length === 1 && /^\d+$/.test(topKeys[0]) && typeof data[topKeys[0]] === 'object') {
        data = data[topKeys[0]];
      }

      // Tryb debug - pokaz JSON i konczy
      if (debugMode) {
        setStatus('Tryb debug - struktura danych z API (skopiuj cala zawartosc i podeslij):');
        showDebug(data);
        return;
      }

      var codes = [];

      // Order - probujemy obu konwencji nazewniczych
      var order = getField(data, ['NUMER ZAMOWIENIA', 'NUMER_ZAMOWIENIA']) || recordId;

      // Strategia 1 (preferowana): pole formuly KODY_KARTONOW_CSV
      var csvValue = getField(data, ['KODY_KARTONOW_CSV', 'KODY KARTONOW CSV']);
      if (csvValue && typeof csvValue === 'string' && csvValue.trim()) {
        codes = csvValue.split(/[,;]/).map(function(c){return c.trim();}).filter(function(c){return c.length > 0;});
      }

      // Strategia 2 (fallback): subtable pod kluczem _subtable_*
      if (codes.length === 0) {
        for (var k in data) {
          if (k.indexOf('_subtable') === 0 && typeof data[k] === 'object') {
            for (var rk in data[k]) {
              var r = data[k][rk];
              if (r && typeof r === 'object') {
                var val = r[CONFIG.SUBTABLE_BARCODE_FIELD_NAME] || r['NUMER_KARTONU'];
                if (val) codes.push(String(val).trim());
              }
            }
          }
        }
      }

      if (codes.length === 0) {
        setStatus('Nie znalazlem kodow. Skopiuj struktura ponizej i podeslij - poprawimy nazwy pol.', true);
        showDebug(data);
        return;
      }

      // Pobranie dodatkowych pol produktu - oba warianty nazw
      var productName = getField(data, ['NAZWA PRODUKTU', 'NAZWA_PRODUKTU']);
      var sku = getField(data, ['SKU']);
      var piecesPerBox = getField(data, ['SZT W KARTON', 'SZT_W_KARTON']);

      // Diagnostyka w konsoli - F12 -> Console pokazuje co znalezlismy
      console.log('[Ragic] Pelne dane:', data);
      console.log('[Ragic] Wyciagniete pola:', {
        order: order, productName: productName, sku: sku,
        piecesPerBox: piecesPerBox, codesCount: codes.length
      });

      setStatus('Generuje PDF dla ' + codes.length + ' kartonow...');

      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      var pageWidth = pdf.internal.pageSize.getWidth();
      var pageHeight = pdf.internal.pageSize.getHeight();

      // Helper: manualne zawijanie tekstu - niezawodne, mierzy kazda linie przez getTextWidth
      function wrapText(text, maxWidth) {
        var words = String(text).split(/\s+/).filter(Boolean);
        var lines = [];
        var current = '';
        for (var i = 0; i < words.length; i++) {
          var test = current ? current + ' ' + words[i] : words[i];
          if (pdf.getTextWidth(test) <= maxWidth) {
            current = test;
          } else {
            if (current) lines.push(current);
            current = words[i];
          }
        }
        if (current) lines.push(current);
        return lines;
      }

      // Helper: dobiera rozmiar czcionki nazwy produktu (drobny druk)
      function fitProductName(text, maxWidth) {
        var candidateSizes = [10, 9, 8, 7];
        for (var i = 0; i < candidateSizes.length; i++) {
          pdf.setFont(undefined, 'normal');
          pdf.setFontSize(candidateSizes[i]);
          var lines = wrapText(text, maxWidth);
          if (lines.length <= 5) return { size: candidateSizes[i], lines: lines };
        }
        pdf.setFont(undefined, 'normal');
        pdf.setFontSize(6);
        return { size: 6, lines: wrapText(text, maxWidth) };
      }

      codes.forEach(function(code, i) {
        if (i > 0) pdf.addPage();

        // 1) SKU - na samej gorze, wieksze, pogrubione
        if (sku) {
          pdf.setFontSize(16); pdf.setFont(undefined, 'bold');
          pdf.text('SKU: ' + sku, pageWidth / 2, 30, { align: 'center' });
        }

        // 2) NAZWA PRODUKTU - pod SKU, drobny druk (regular)
        if (productName) {
          var fitted = fitProductName(String(productName), pageWidth - 40);
          pdf.setFont(undefined, 'normal');
          pdf.setFontSize(fitted.size);
          pdf.text(fitted.lines, pageWidth / 2, 45, { align: 'center' });
        }

        // 3) Naglowek "Karton X z Y"
        pdf.setFontSize(24); pdf.setFont(undefined, 'bold');
        pdf.text('Karton ' + (i + 1) + ' z ' + codes.length, pageWidth / 2, 90, { align: 'center' });

        // 4) Kod kreskowy
        var canvas = document.createElement('canvas');
        JsBarcode(canvas, code, {
          format: CONFIG.BARCODE_FORMAT,
          width: 3, height: 120,
          displayValue: true, fontSize: 22, margin: 10
        });
        var imgData = canvas.toDataURL('image/png');
        var bw = 160, bh = 60;
        var x = (pageWidth - bw) / 2;
        pdf.addImage(imgData, 'PNG', x, 105, bw, bh);

        // 5) SZT W KARTONIE
        if (piecesPerBox) {
          pdf.setFontSize(20); pdf.setFont(undefined, 'bold');
          pdf.text('Sztuk w kartonie: ' + piecesPerBox, pageWidth / 2, 200, { align: 'center' });
        }

        // 6) Numer zamowienia
        pdf.setFontSize(12); pdf.setFont(undefined, 'normal');
        pdf.text('Zamowienie: ' + order, pageWidth / 2, 230, { align: 'center' });
      });

      var fileName = 'etykiety_' + String(order).replace(/[\/\\:*?"<>|]/g, '_') + '.pdf';
      pdf.save(fileName);

      setStatus('Pobrano ' + codes.length + ' etykiet. Wracam do Ragic...');
      setTimeout(returnToRagic, 700);

    } catch (err) {
      setStatus('Blad podczas przetwarzania: ' + err.message, true);
      console.error(err);
    }
  }).catch(function(err) {
    setStatus(err.message, true);
  });
}

if (document.readyState === 'complete') {
  generate();
} else {
  window.addEventListener('load', generate);
}
</script>

</body>
</html>
