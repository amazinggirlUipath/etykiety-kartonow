<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Pobieranie etykiet...</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; margin: 0; background: #fafafa; color: #555;
  }
  .box { text-align: center; padding: 24px; max-width: 480px; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e0e0e0; border-top-color: #2c5282;
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status { font-size: 14px; }
  .err { color: #c33; }
  .err + #spinner { display: none; }
  .back-link {
    display: inline-block; margin-top: 16px;
    color: #2c5282; text-decoration: none; font-size: 13px;
  }
  pre {
    background: #f0f0f0; padding: 8px; border-radius: 4px;
    font-size: 11px; text-align: left; overflow: auto;
    max-height: 200px; margin-top: 12px;
  }
</style>
</head>
<body>

<div class="box">
  <div class="spinner" id="spinner"></div>
  <div id="status">Inicjalizacja...</div>
  <a href="#" class="back-link" id="backLink" style="display:none" onclick="returnToRagic(); return false;">Wroc do Ragic</a>
  <pre id="debug" style="display:none"></pre>
</div>

<script>
// ============ KONFIGURACJA - WYPELNIJ TE 5 POL ============
var CONFIG = {
  // 1) Bazowy URL arkusza (z URL Publish to Web, fragment PRZED znakiem ?)
  //    Przyklad: https://eu3.ragic.com/AmazingGirlUiPath/MagazynGlowny/8
  BASE_URL: 'WPISZ_TUTAJ_BAZOWY_URL_ARKUSZA',

  // 2) API key (fragment z URL Publish to Web po "APIKey=")
  API_KEY: 'WPISZ_TUTAJ_API_KEY',

  // 3) Dokladna nazwa pola z numerem kartonu w subtabeli (z polskimi znakami)
  SUBTABLE_BARCODE_FIELD_NAME: 'NUMER KARTONU',

  // 4) Nazwa pola z numerem zamowienia (do tytulu PDF)
  ORDER_FIELD_NAME: 'NUMER ZAMOWIENIA',

  // 5) Format kodu kreskowego: CODE128, EAN13, CODE39, ITF14 itp.
  BARCODE_FORMAT: 'CODE128'
};
// ===========================================================

function setStatus(msg, isErr) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = isErr ? 'err' : '';
  if (isErr) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('backLink').style.display = 'inline-block';
  }
}

function showDebug(obj) {
  var el = document.getElementById('debug');
  el.style.display = 'block';
  el.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
}

function returnToRagic() {
  try { window.close(); } catch(e) {}
  setTimeout(function() {
    if (window.history.length > 1) window.history.back();
  }, 80);
}

// JSONP - sposob na ominiecie CORS przy zapytaniach do Ragic API
function jsonp(url) {
  return new Promise(function(resolve, reject) {
    var callbackName = 'ragicCb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
    var script = document.createElement('script');
    var timeout = setTimeout(function() {
      reject(new Error('Timeout - Ragic API nie odpowiada w ciagu 15s'));
      cleanup();
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(data) {
      resolve(data);
      cleanup();
    };

    var sep = url.indexOf('?') === -1 ? '?' : '&';
    script.src = url + sep + 'callback=' + callbackName;
    script.onerror = function() {
      reject(new Error('Nie udalo sie polaczyc z Ragic API. Sprawdz BASE_URL i API_KEY.'));
      cleanup();
    };
    document.head.appendChild(script);
  });
}

function generate() {
  // Walidacja konfiguracji
  if (CONFIG.BASE_URL.indexOf('WPISZ') === 0 || CONFIG.API_KEY.indexOf('WPISZ') === 0) {
    setStatus('Plik HTML nie jest skonfigurowany - wypelnij CONFIG na gorze pliku.', true);
    return;
  }

  var params = new URLSearchParams(window.location.search);
  var recordId = params.get('recordId');

  if (!recordId) {
    setStatus('Brak parametru recordId w URL', true);
    return;
  }

  setStatus('Pobieram dane z Ragic...');

  var apiUrl = CONFIG.BASE_URL + '/' + recordId + '?api&v=3&APIKey=' + CONFIG.API_KEY + '&naming=fname';

  jsonp(apiUrl).then(function(data) {
    try {
      var codes = [];
      var order = data[CONFIG.ORDER_FIELD_NAME] || recordId;

      // Ragic typowo zwraca subtable jako obiekt zagniezdzony pod kluczem
      // bedacym nazwa pierwszego pola subtabeli (lub kazdej kolumny subtabeli)
      // Format: { "1": { "NUMER KARTONU": "MG/.../1", ... }, "2": {...}, ... }
      var directSubtable = data[CONFIG.SUBTABLE_BARCODE_FIELD_NAME];

      if (directSubtable && typeof directSubtable === 'object') {
        for (var rowKey in directSubtable) {
          var rowVal = directSubtable[rowKey];
          if (typeof rowVal === 'string' && rowVal.trim()) {
            // Format prosty: { rowKey: "wartosc" }
            codes.push(rowVal.trim());
          } else if (typeof rowVal === 'object' && rowVal !== null) {
            // Format zagniezdzony: { rowKey: { fieldName: "wartosc" } }
            var v = rowVal[CONFIG.SUBTABLE_BARCODE_FIELD_NAME];
            if (v) codes.push(String(v).trim());
          }
        }
      }

      // Fallback: skanuj rekurencyjnie jesli nic nie znaleziono
      if (codes.length === 0) {
        function scan(obj) {
          if (!obj || typeof obj !== 'object') return;
          var keys = Object.keys(obj);
          var isSubtable = keys.length > 0 && keys.every(function(k){return /^[\d_-]+$/.test(k);});
          if (isSubtable) {
            for (var i = 0; i < keys.length; i++) {
              var row = obj[keys[i]];
              if (row && typeof row === 'object') {
                var val = row[CONFIG.SUBTABLE_BARCODE_FIELD_NAME];
                if (val && String(val).trim()) codes.push(String(val).trim());
              }
            }
          } else {
            for (var k in obj) {
              if (typeof obj[k] === 'object' && obj[k] !== null) scan(obj[k]);
            }
          }
        }
        scan(data);
      }

      if (codes.length === 0) {
        setStatus('Nie znalazlem kodow w odpowiedzi API. Sprawdz nazwe pola SUBTABLE_BARCODE_FIELD_NAME. Struktura danych:', true);
        showDebug(data);
        return;
      }

      setStatus('Generuje PDF dla ' + codes.length + ' kartonow...');

      var jsPDF = window.jspdf.jsPDF;
      var pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
      var pageWidth = pdf.internal.pageSize.getWidth();
      var pageHeight = pdf.internal.pageSize.getHeight();

      codes.forEach(function(code, i) {
        if (i > 0) pdf.addPage();

        var canvas = document.createElement('canvas');
        JsBarcode(canvas, code, {
          format: CONFIG.BARCODE_FORMAT,
          width: 3, height: 120,
          displayValue: true, fontSize: 22, margin: 10
        });

        var imgData = canvas.toDataURL('image/png');
        var bw = 160, bh = 60;
        var x = (pageWidth - bw) / 2;
        var y = (pageHeight - bh) / 2 - 10;

        pdf.setFontSize(22); pdf.setFont(undefined, 'bold');
        pdf.text('Karton ' + (i + 1) + ' z ' + codes.length, pageWidth / 2, y - 25, { align: 'center' });

        pdf.addImage(imgData, 'PNG', x, y, bw, bh);

        pdf.setFontSize(14); pdf.setFont(undefined, 'normal');
        pdf.text('Zamowienie: ' + order, pageWidth / 2, y + bh + 20, { align: 'center' });
      });

      var fileName = 'etykiety_' + String(order).replace(/[\/\\:*?"<>|]/g, '_') + '.pdf';
      pdf.save(fileName);

      setStatus('Pobrano ' + codes.length + ' etykiet. Wracam do Ragic...');
      setTimeout(returnToRagic, 700);

    } catch (err) {
      setStatus('Blad podczas przetwarzania: ' + err.message, true);
      console.error(err);
    }
  }).catch(function(err) {
    setStatus(err.message, true);
  });
}

if (document.readyState === 'complete') {
  generate();
} else {
  window.addEventListener('load', generate);
}
</script>

</body>
</html>
